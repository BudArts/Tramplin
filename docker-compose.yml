version: '3.9'

services:
  # ============================================
  # PostgreSQL
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: tramplin-db
    environment:
      POSTGRES_DB: ${DB_NAME:-tramplin}
      POSTGRES_USER: ${DB_USER:-tramplin_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tramplin_user} -d ${DB_NAME:-tramplin}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - tramplin-network

  # ============================================
  # Backend API
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tramplin-backend
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-tramplin_user}:${DB_PASSWORD:-strongpassword123}@db:5432/${DB_NAME:-tramplin}
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-super-secret-jwt-key-2026}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      
      # Email (ДОБАВЛЯЕМ!)
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@tramplin.ru}
      MAIL_SERVER: ${MAIL_SERVER:-smtp.mail.ru}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_STARTTLS: ${MAIL_STARTTLS:-True}
      MAIL_SSL_TLS: ${MAIL_SSL_TLS:-False}
      
      # Frontend
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      
      # App
      APP_NAME: ${APP_NAME:-Tramplin}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      EMAIL_VERIFICATION_EXPIRE_HOURS: ${EMAIL_VERIFICATION_EXPIRE_HOURS:-24}
      
      # Admin
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@tramplin.ru}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:80,http://localhost}
      
      # Rate Limiting
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      
      # Redis (если используется)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      
      # FNS API (если используется)
      FNS_API_URL: ${FNS_API_URL:-https://api-fns.ru/api}
      FNS_API_KEY: ${FNS_API_KEY:-}
      
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app          # hot-reload для разработки
      - uploaded_files:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tramplin-network

volumes:
  postgres_data:
    driver: local
  uploaded_files:
    driver: local

networks:
  tramplin-network:
    driver: bridge