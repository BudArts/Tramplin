version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: tramplin-db
    environment:
      POSTGRES_DB: tramplin
      POSTGRES_USER: tramplin_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tramplin_user -d tramplin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tramplin-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://tramplin_user:${DB_PASSWORD:-strongpassword123}@db:5432/tramplin
    ports:
      - "8000:8000"
    volumes:
      - uploaded_files:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  uploaded_files: